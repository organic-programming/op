syntax = "proto3";

package holonmeta.v1;

option go_package = "github.com/organic-programming/grace-op/gen/go/holonmeta/v1;holonmetav1";

// HolonMeta provides self-documentation for any holon.
service HolonMeta {
  // Describe returns the holon's API catalog.
  rpc Describe(DescribeRequest) returns (DescribeResponse);
}

message DescribeRequest {}

message DescribeResponse {
  string slug = 1;
  string motto = 2;
  repeated ServiceDoc services = 3;
}

message ServiceDoc {
  string name = 1;
  string description = 2;
  repeated MethodDoc methods = 3;
}

message MethodDoc {
  string name = 1;
  string description = 2;
  string input_type = 3;
  string output_type = 4;
  repeated FieldDoc input_fields = 5;
  repeated FieldDoc output_fields = 6;
  bool client_streaming = 7;
  bool server_streaming = 8;
  string example_input = 9;
}

message FieldDoc {
  string name = 1;
  string type = 2;
  int32 number = 3;
  string description = 4;
  FieldLabel label = 5;
  string map_key_type = 6;
  string map_value_type = 7;
  repeated FieldDoc nested_fields = 8;
  repeated EnumValueDoc enum_values = 9;
  bool required = 10;
  string example = 11;
}

enum FieldLabel {
  FIELD_LABEL_UNSPECIFIED = 0;
  FIELD_LABEL_OPTIONAL = 1;
  FIELD_LABEL_REPEATED = 2;
  FIELD_LABEL_MAP = 3;
  FIELD_LABEL_REQUIRED = 4;
}

message EnumValueDoc {
  string name = 1;
  int32 number = 2;
  string description = 3;
}
